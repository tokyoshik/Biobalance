<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthLogic | Протокол</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="components.js"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #fafafa; color: #111; margin: 0; padding: 0; line-height: 1.6; }
        .container { max-width: 750px; margin: 0 auto; padding: 60px 20px; }
        
        /* Заголовок: мощный и четкий */
        h1 { font-size: 52px; font-weight: 900; line-height: 1.05; letter-spacing: -2px; text-transform: uppercase; margin-bottom: 40px; }
        
        /* Контейнер для блоков контента */
        .content-area { display: flex; flex-direction: column; gap: 30px; }

        /* Текстовый блок: читабельный шрифт */
        .txt { font-size: 20px; color: #333; white-space: pre-wrap; }

        /* Блок изображения: исправляем размер и качество */
        .img-wrap { width: 100%; border-radius: 8px; overflow: hidden; background: #eee; border: 1px solid #ddd; }
        .img-wrap img { 
            width: 100%; 
            height: auto; 
            display: block; 
            object-fit: cover; /* Чтобы картинка не растягивалась уродливо */
            max-height: 70vh; /* Ограничиваем высоту, чтобы не была на весь экран */
        }

        .meta { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; margin-bottom: 10px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="meta">HealthLogic Protocol // 2026</div>
        <h1 id="title-display">Загрузка...</h1>
        <div id="content-display" class="content-area"></div>
    </div>

    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        if(id) {
            db.ref(`articles/${id}`).on('value', snap => {
                const data = snap.val();
                if(!data) return;

                // Ставим заголовок
                document.getElementById('title-display').innerText = data.title;
                
                const area = document.getElementById('content-display');
                area.innerHTML = "";

                // Проходим по всем блокам из базы
                if(data.blocks && Array.isArray(data.blocks)) {
                    data.blocks.forEach(block => {
                        if(block.type === 'text' && block.content) {
                            const p = document.createElement('div');
                            p.className = 'txt';
                            p.innerText = block.content;
                            area.appendChild(p);
                        } 
                        else if(block.type === 'image' && block.content) {
                            const wrap = document.createElement('div');
                            wrap.className = 'img-wrap';
                            wrap.innerHTML = `<img src="${block.content}" loading="lazy" onerror="this.parentElement.style.display='none'">`;
                            area.appendChild(wrap);
                        }
                    });
                }
            });
        }
    </script>
</body>
</html>
