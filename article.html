<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HL | Статья</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="components.js"></script>
    <style>
        :root { --border: 4px solid #000; }
        body { font-family: 'Inter', sans-serif; background: #FDF5E6; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .title { font-weight: 900; font-size: 50px; text-transform: uppercase; line-height: 1; margin-bottom: 20px; }
        .content { display: flex; flex-wrap: wrap; gap: 20px; margin: 30px 0; }
        .w-50 { width: calc(50% - 10px); } .w-100 { width: 100%; }
        img { width: 100%; border: var(--border); }
        .like-sec { border-top: var(--border); padding: 20px 0; }
        .like-btn { padding: 15px; border: var(--border); background: #fff; font-weight: 900; cursor: pointer; }
        .like-btn.active { background: #ff4444; color: #fff; }
        .comm-box { background: #fff; border: var(--border); padding: 20px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="a-title" class="title">Загрузка...</h1>
        <img id="a-main-img" src="" style="display:none; margin-bottom: 20px;">
        <div id="a-content" class="content"></div>

        <div class="like-sec">
            <button id="l-btn" class="like-btn" onclick="tLike()">❤️ <span id="l-count">0</span></button>
        </div>

        <div class="comm-box">
            <div id="c-list"></div>
            <textarea id="c-input" style="width:100%; margin-top:10px;" placeholder="Ваш коммент..."></textarea>
            <button onclick="sComm()" style="width:100%; padding:10px; background:#000; color:#fff; border:none; margin-top:5px; font-weight:900;">ОТПРАВИТЬ</button>
        </div>
    </div>

    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        if(!id) location.href='index.html';

        db.ref('articles/'+id).on('value', snap => {
            const d = snap.val(); if(!d) return;
            document.getElementById('a-title').innerText = d.title;
            if(d.image) { const i = document.getElementById('a-main-img'); i.src = d.image; i.style.display='block'; }
            const cont = document.getElementById('a-content'); cont.innerHTML = '';
            d.blocks.forEach(b => {
                const div = document.createElement('div');
                div.className = b.width === '50' ? 'w-50' : 'w-100';
                div.innerHTML = b.type === 'text' ? `<p>${b.content}</p>` : `<img src="${b.content}">`;
                cont.appendChild(div);
            });
        });

        function tLike() {
            const u = auth.currentUser; if(!u) return alert("Войди!");
            const r = db.ref(`likes/${id}/${u.uid}`);
            r.once('value').then(s => s.exists() ? r.remove() : r.set(true));
        }

        db.ref(`likes/${id}`).on('value', s => {
            const l = s.val() || {};
            document.getElementById('l-count').innerText = Object.keys(l).length;
            const b = document.getElementById('l-btn');
            if(auth.currentUser && l[auth.currentUser.uid]) b.classList.add('active');
            else b.classList.remove('active');
        });

        function sComm() {
            const t = document.getElementById('c-input').value;
            const u = auth.currentUser; if(!t || !u) return;
            db.ref(`comments/${id}`).push({ author: u.displayName || "Аноним", text: t }).then(() => { document.getElementById('c-input').value = ''; });
        }

        db.ref(`comments/${id}`).on('value', s => {
            const list = document.getElementById('c-list'); list.innerHTML = '';
            s.forEach(c => { const v = c.val(); list.innerHTML += `<p><b>${v.author}:</b> ${v.text}</p>`; });
        });
    </script>
</body>
</html>
