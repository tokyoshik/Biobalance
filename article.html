<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HealthLogic | Статья</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <script src="components.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --border: 4px solid #000; --bg: #fdf5e6; --accent: #ffcc00; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; padding: 20px; color: #000; overflow-x: hidden; }
        
        .container { max-width: 800px; margin: 0 auto; }
        
        /* Навигация */
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .back-link { font-weight: 900; text-transform: uppercase; text-decoration: none; color: #000; border-bottom: 3px solid #000; }

        /* Контент статьи */
        .article-header h1 { font-size: clamp(32px, 8vw, 64px); font-weight: 900; text-transform: uppercase; line-height: 0.9; margin-bottom: 25px; }
        .main-img { width: 100%; border: var(--border); box-shadow: 10px 10px 0px #000; margin-bottom: 40px; display: block; background: #eee; }
        .content-text { font-size: 20px; line-height: 1.6; font-weight: 500; margin-bottom: 50px; white-space: pre-wrap; }

        /* Лайки и Просмотры */
        .stats-bar { display: flex; gap: 20px; align-items: center; margin-bottom: 50px; padding: 25px 0; border-top: var(--border); }
        .btn-like { background: #fff; border: var(--border); padding: 12px 25px; font-weight: 900; cursor: pointer; font-size: 18px; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .btn-like:hover { transform: translate(-2px, -2px); box-shadow: 4px 4px 0px #000; }
        .btn-like.active { background: #ff4444; color: #fff; }

        /* Комментарии */
        .comments-section { background: #fff; border: var(--border); padding: 35px; box-shadow: 12px 12px 0px #000; margin-bottom: 50px; }
        .comments-section h2 { font-weight: 900; text-transform: uppercase; margin-bottom: 25px; border-bottom: 4px solid #000; display: inline-block; }
        
        .comment-item { border-bottom: 2px solid #eee; padding: 20px 0; }
        .comment-author { font-weight: 900; text-transform: uppercase; font-size: 12px; display: block; margin-bottom: 8px; color: #555; background: var(--accent); display: inline-block; padding: 0 5px; }
        .comment-text { font-weight: 700; font-size: 16px; line-height: 1.4; }
        
        .comment-form textarea { width: 100%; border: var(--border); padding: 20px; font-family: inherit; font-weight: 700; margin-top: 30px; min-height: 120px; outline: none; background: #fafafa; }
        .comment-form button { width: 100%; padding: 20px; background: #000; color: #fff; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .comment-form button:hover { background: #333; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-nav">
        <a href="index.html" class="back-link">← На главную</a>
        <div id="user-panel"></div>
    </div>

    <article id="article-data">
        <div class="article-header">
            <h1 id="a-title">Загрузка контента...</h1>
            <img id="a-img" src="" class="main-img" style="display:none;">
        </div>
        
        <div id="a-content" class="content-text"></div>

        <div class="stats-bar">
            <button id="like-btn" class="btn-like" onclick="handleLike()">❤️ <span id="like-count">0</span></button>
            <span style="font-weight: 900; text-transform: uppercase; letter-spacing: 1px;">
                👀 Просмотры: <span id="view-count">0</span>
            </span>
        </div>
    </article>

    <section class="comments-section">
        <h2>Обсуждение</h2>
        <div id="comments-list"></div>

        <div id="comm-form" style="display:none;" class="comment-form">
            <textarea id="comm-input" placeholder="ТВОИ МЫСЛИ..."></textarea>
            <button onclick="sendComment()">Оставить комментарий</button>
        </div>
        
        <div id="comm-guest-msg" style="display:none; text-align:center; padding: 20px; border: 2px dashed #000; margin-top: 30px;">
            <p style="font-weight: 900; text-transform: uppercase;">
                Чтобы участвовать в обсуждении — <a href="auth.html" style="color:#000; background: var(--accent); padding: 0 5px;">ВОЙДИТЕ В АККАУНТ</a>
            </p>
        </div>
    </section>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const articleId = urlParams.get('id');

    if (!articleId) { window.location.href = 'index.html'; }

    // 1. ЗАГРУЗКА ДАННЫХ
    db.ref(`articles/${articleId}`).on('value', snap => {
        const data = snap.val();
        if (!data) return;

        document.getElementById('a-title').innerText = data.title;
        if (data.image) {
            const img = document.getElementById('a-img');
            img.src = data.image;
            img.style.display = 'block';
        }
        
        if (data.blocks && data.blocks[0]) {
            document.getElementById('a-content').innerText = data.blocks[0].content;
        }

        document.getElementById('view-count').innerText = data.views || 0;
    });

    // Трекинг просмотров из components.js
    trackView(articleId);

    // 2. ЛАЙКИ (с использованием showNotify)
    function handleLike() {
        const user = auth.currentUser;
        if (!user) {
            showNotify("ДЛЯ ЛАЙКОВ НУЖНА АВТОРИЗАЦИЯ!");
            return;
        }
        
        const ref = db.ref(`likes/${articleId}/${user.uid}`);
        ref.once('value').then(s => {
            if (s.exists()) {
                ref.remove();
            } else {
                ref.set(true);
                showNotify("ТВОЙ ЛАЙК ЗАСЧИТАН!");
            }
        });
    }

    db.ref(`likes/${articleId}`).on('value', snap => {
        const likes = snap.val() || {};
        const count = Object.keys(likes).length;
        document.getElementById('like-count').innerText = count;
        
        const btn = document.getElementById('like-btn');
        if (auth.currentUser && likes[auth.currentUser.uid]) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });

    // 3. КОММЕНТАРИИ (с использованием showNotify)
    async function sendComment() {
        const textInput = document.getElementById('comm-input');
        const text = textInput.value.trim();
        const user = auth.currentUser;

        if (!user) {
            showNotify("ТОЛЬКО ДЛЯ ЗАРЕГИСТРИРОВАННЫХ АТЛЕТОВ!");
            return;
        }

        if (!text) {
            showNotify("ПУСТОЕ СООБЩЕНИЕ!");
            return;
        }

        try {
            const userSnap = await db.ref(`users/${user.uid}`).once('value');
            const nickname = userSnap.val()?.username || "Атлет";

            await db.ref(`comments/${articleId}`).push({
                author: nickname,
                text: text,
                timestamp: Date.now()
            });

            textInput.value = '';
            showNotify("КОММЕНТАРИЙ ОПУБЛИКОВАН!");
        } catch (e) {
            showNotify("ОШИБКА ОТПРАВКИ");
        }
    }

    db.ref(`comments/${articleId}`).on('value', snap => {
        const list = document.getElementById('comments-list');
        list.innerHTML = '';
        snap.forEach(child => {
            const c = child.val();
            list.innerHTML += `
                <div class="comment-item">
                    <span class="comment-author">${c.author}</span>
                    <p class="comment-text">${c.text}</p>
                </div>`;
        });
    });

    // 4. ПРОВЕРКА СОСТОЯНИЯ ФОРМЫ
    auth.onAuthStateChanged(user => {
        document.getElementById('comm-form').style.display = user ? 'block' : 'none';
        document.getElementById('comm-guest-msg').style.display = user ? 'none' : 'block';
    });
</script>
</body>
</html>
