<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthLogic | Статья</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="components.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --border: 4px solid #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f5f5f5; font-family: 'Inter', sans-serif; padding: 15px; }
        .wrapper { max-width: 1100px; margin: 0 auto; }
        .title { font-size: clamp(30px, 8vw, 80px); font-weight: 900; text-transform: uppercase; line-height: 0.9; margin: 40px 0 20px; }
        .grid { display: flex; flex-wrap: wrap; gap: 20px; }
        .box { background: #fff; border: var(--border); padding: 25px; font-weight: 600; }
        .left { flex: 1; min-width: 300px; font-size: 18px; }
        .right { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 20px; }
        .img { width: 100%; border: var(--border); height: auto; display: block; background: #eee; }
        @media (max-width: 600px) { .left, .right { min-width: 100%; } }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1 id="t" class="title">...</h1>
        <div class="grid">
            <div id="tl" class="box left"></div>
            <div class="right">
                <img id="ir" src="" class="img">
                <div id="tf" class="box"></div>
            </div>
        </div>
    </div>
    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        db.ref(`articles/${id}`).on('value', s => {
            const d = s.val(); if(!d) return;
            // Проверка: если нового поля нет, берем старое или ставим пустую строку
            document.getElementById('t').innerText = d.title || "Без заголовка";
            document.getElementById('tl').innerText = d.textL || d.content || "Текст отсутствует";
            document.getElementById('ir').src = d.imgR || d.image || d.mainImage || "";
            document.getElementById('tf').innerText = d.textF || "Дополнительная информация...";
        });
    </script>
</body>
</html>
