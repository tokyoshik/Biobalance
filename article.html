<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthLogic | Просмотр</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="components.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ffcc00; --border: 4px solid #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f5f5f5; font-family: 'Inter', sans-serif; padding: 15px; }

        .container { max-width: 1100px; margin: 0 auto; opacity: 0; transform: translateY(20px); animation: show 0.6s forwards; }
        @keyframes show { to { opacity: 1; transform: translateY(0); } }

        .title { font-size: clamp(32px, 10vw, 80px); font-weight: 900; text-transform: uppercase; line-height: 0.8; letter-spacing: -3px; margin: 40px 0 20px; }
        .info-strip { border: var(--border); background: #fff; padding: 10px; font-weight: 900; text-transform: uppercase; font-size: 12px; margin-bottom: 20px; }

        /* Сетка: на ПК в ряд, на мобилках в столбик */
        .grid { display: flex; flex-wrap: wrap; gap: 20px; }
        .left { flex: 1; min-width: 300px; border: var(--border); background: #fff; padding: 30px; font-size: 18px; font-weight: 600; line-height: 1.5; }
        .right { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 20px; }
        
        .img-block { width: 100%; border: var(--border); height: auto; min-height: 250px; object-fit: cover; }
        .final-text { border: var(--border); background: #fff; padding: 20px; font-weight: 600; font-size: 16px; }

        @media (max-width: 600px) { .left, .right { min-width: 100%; } .title { letter-spacing: -1px; } }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="t" class="title">ЗАГРУЗКА...</h1>
        <div class="info-strip">HealthLogic // Original Protocol // 2026</div>
        <div class="grid">
            <div id="tl" class="left"></div>
            <div class="right">
                <img id="ir" src="" class="img-block">
                <div id="tf" class="final-text"></div>
            </div>
        </div>
    </div>
    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        db.ref(`articles/${id}`).on('value', s => {
            const d = s.val(); if(!d) return;
            document.getElementById('t').innerText = d.title || d.title;
            document.getElementById('tl').innerText = d.textL || d.contentL;
            document.getElementById('ir').src = d.imgR || d.imageR;
            document.getElementById('tf').innerText = d.textF || d.contentF;
        });
        trackView(id);
    </script>
</body>
</html>
