<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HL | Протокол</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="components.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --border: 4px solid #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f5f5f5; font-family: 'Inter', sans-serif; padding: 20px; color: #000; }
        .wrapper { max-width: 1000px; margin: 0 auto; }
        
        .post-title { font-size: clamp(35px, 8vw, 90px); font-weight: 900; text-transform: uppercase; line-height: 0.85; letter-spacing: -3px; margin-bottom: 30px; }
        
        /* Контейнер для блоков */
        #article-content { display: flex; flex-direction: column; gap: 20px; }

        /* Стиль текстового блока */
        .b-text { background: #fff; border: var(--border); padding: 30px; font-size: 19px; font-weight: 600; line-height: 1.6; white-space: pre-wrap; box-shadow: 8px 8px 0 #000; }
        
        /* Стиль картинки */
        .b-img { width: 100%; border: var(--border); display: block; box-shadow: 8px 8px 0 #000; object-fit: cover; }

        .loading { font-weight: 900; text-transform: uppercase; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1 id="view-title" class="post-title">ЗАГРУЗКА...</h1>
        <div id="article-content">
            <p class="loading">Синхронизация протокола...</p>
        </div>
    </div>

    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        if(id) {
            db.ref(`articles/${id}`).on('value', snap => {
                const data = snap.val();
                if(!data) return;

                document.getElementById('view-title').innerText = data.title;
                const container = document.getElementById('article-content');
                container.innerHTML = ""; 

                // Если есть массив блоков (новый редактор)
                if(data.blocks && Array.isArray(data.blocks)) {
                    data.blocks.forEach(block => {
                        if(block.type === 'text' && block.content) {
                            const div = document.createElement('div');
                            div.className = "b-text";
                            div.innerText = block.content;
                            container.appendChild(div);
                        } 
                        else if(block.type === 'image' && block.content) {
                            const img = document.createElement('img');
                            img.className = "b-img";
                            img.src = block.content;
                            container.appendChild(img);
                        }
                    });
                } else {
                    // Резервный вариант для старых статей
                    const div = document.createElement('div');
                    div.className = "b-text";
                    div.innerText = data.content || data.textL || "Контент не найден";
                    container.appendChild(div);
                }
            });
            trackView(id);
        }
    </script>
</body>
</html>
