<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HL | COMMAND CENTER</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="components.js"></script>
    <style>
        :root { --blue: #0071e3; --bg: #f5f5f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: none; color: #1d1d1f; }
        .sidebar { width: 250px; position: fixed; height: 100vh; background: #fff; border-right: 1px solid #d2d2d7; padding: 30px; box-sizing: border-box; }
        .main { margin-left: 250px; padding: 40px; }
        
        .card { background: #fff; border-radius: 18px; padding: 25px; margin-bottom: 25px; border: 1px solid #d2d2d7; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        
        h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
        .btn { padding: 10px 20px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn-del { background: #ff3b30; color: #fff; padding: 5px 10px; font-size: 12px; }

        input, textarea { width: 100%; border: 1px solid #d2d2d7; border-radius: 10px; padding: 12px; margin-top: 10px; box-sizing: border-box; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f5f5f7; }
    </style>
</head>
<body id="adminPanel">

<div class="sidebar">
    <h2>HL Admin</h2>
    <p style="font-size: 13px; color: #86868b;">Система активна</p>
    <br>
    <button class="btn" style="width:100%" onclick="firebase.auth().signOut()">Выход</button>
</div>

<div class="main">
    <div class="stat-grid">
        <div class="card">
            <small>Всего лайков</small>
            <h2 id="totalLikes">0</h2>
        </div>
        <div class="card">
            <small>Всего статей</small>
            <h2 id="totalArticles">0</h2>
        </div>
    </div>

    <div class="card">
        <h1>Создать Протокол</h1>
        <input type="text" id="postTitle" placeholder="Заголовок">
        <div id="editor"></div>
        <div style="margin-top:20px; gap: 10px; display:flex;">
            <button class="btn" onclick="addBlock('text')">+ Текст</button>
            <button class="btn" onclick="addBlock('image')">+ Изображение</button>
            <button class="btn btn-blue" style="margin-left:auto" onclick="publish()">Опубликовать</button>
        </div>
    </div>

    <div class="card">
        <h1>Управление статьями</h1>
        <div id="articlesList"></div>
    </div>
</div>

<script>
    firebase.auth().onAuthStateChanged(user => {
        if (user) { document.getElementById('adminPanel').style.display = 'block'; loadData(); }
        else { window.location.href = "login.html"; }
    });

    let blocks = [];
    function addBlock(t) { blocks.push({ id: Date.now(), type: t, content: "" }); renderEditor(); }

    function renderEditor() {
        const ed = document.getElementById('editor'); ed.innerHTML = "";
        blocks.forEach(b => {
            const div = document.createElement('div');
            div.innerHTML = b.type === 'text' 
                ? `<textarea oninput="blocks.find(x=>x.id===${b.id}).content=this.value" placeholder="Контент..."></textarea>`
                : `<input oninput="blocks.find(x=>x.id===${b.id}).content=this.value" placeholder="URL картинки">`;
            ed.appendChild(div);
        });
    }

    async function publish() {
        const t = document.getElementById('postTitle').value;
        if(!t || blocks.length === 0) return alert("Заполни поля");
        await db.ref('articles').push({ title: t, blocks: blocks, date: Date.now(), likes: 0 });
        location.reload();
    }

    function loadData() {
        db.ref('articles').on('value', s => {
            const data = s.val(); if(!data) return;
            const arr = Object.keys(data).map(k => ({id: k, ...data[k]}));
            
            document.getElementById('totalArticles').innerText = arr.length;
            document.getElementById('totalLikes').innerText = arr.reduce((sum, p) => sum + (p.likes || 0), 0);
            
            const list = document.getElementById('articlesList'); list.innerHTML = "";
            arr.reverse().forEach(p => {
                list.innerHTML += `
                    <div class="list-item">
                        <span>${p.title}</span>
                        <button class="btn-del" onclick="deletePost('${p.id}')">Удалить</button>
                    </div>`;
            });
        });
    }

    function deletePost(id) {
        if(confirm("Удалить статью?")) {
            db.ref(`articles/${id}`).remove();
            db.ref(`comments/${id}`).remove();
        }
    }
</script>
</body>
</html>
