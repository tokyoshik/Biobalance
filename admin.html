<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления | HEALTHLOGIC</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22black%22/><text y=%2250%%22 x=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-family=%22Inter, sans-serif%22 font-size=%2260%22 font-weight=%22900%22 fill=%22white%22>H</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f5f5f7; --accent: #007aff; --radius: 20px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1d1d1f; padding-top: 80px; }

        /* HEADER */
        .admin-header { position: fixed; top: 0; width: 100%; height: 64px; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); z-index: 1000; border-bottom: 0.5px solid rgba(0,0,0,0.1); }
        .logo { font-weight: 900; text-decoration: none; color: #000; display: flex; align-items: center; gap: 8px; }
        .nav-links a { text-decoration: none; color: #1d1d1f; font-size: 14px; font-weight: 600; margin-left: 20px; transition: 0.2s; }
        .nav-links a:hover { color: var(--accent); }

        /* CONTENT */
        .admin-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .admin-card { background: #fff; border-radius: var(--radius); padding: 30px; border: 1px solid rgba(0,0,0,0.05); margin-bottom: 30px; }
        
        h1 { font-size: 28px; font-weight: 900; margin-bottom: 25px; letter-spacing: -1px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 800; text-transform: uppercase; color: #86868b; margin-bottom: 8px; }
        input, textarea, select { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #d2d2d7; background: #fbfbfd; font-family: inherit; font-size: 16px; }
        
        .btn-save { background: #000; color: #fff; border: none; padding: 18px 40px; border-radius: 50px; font-weight: 700; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-save:hover { transform: scale(1.02); opacity: 0.9; }

        .articles-list { margin-top: 40px; }
        .article-item { background: #fff; padding: 20px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(0,0,0,0.05); }
        .btn-delete { color: #ff3b30; background: none; border: none; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<header class="admin-header">
    <a href="index.html" class="logo">HEALTHLOGIC ADMIN</a>
    <nav class="nav-links">
        <a href="index.html">На сайт</a>
        <a href="profile.html">Мой профиль</a>
        <a href="#" id="admin-logout" style="color: #ff3b30;">Выход</a>
    </nav>
</header>

<main class="admin-container">
    <div class="admin-card">
        <h1>Добавить новую статью</h1>
        <div class="form-group">
            <label>Заголовок статьи</label>
            <input type="text" id="post-title" placeholder="Напр: Омега-3: Глубокий анализ">
        </div>
        <div class="form-group">
            <label>Категория (Tag)</label>
            <input type="text" id="post-tag" placeholder="PROTOCOL 04 / SUPPLEMENTS">
        </div>
        <div class="form-group">
            <label>Краткое описание</label>
            <textarea id="post-desc" rows="3" placeholder="О чем эта статья..."></textarea>
        </div>
        <div class="form-group">
            <label>Ссылка на файл (slug)</label>
            <input type="text" id="post-link" placeholder="omega3.html">
        </div>
        <button class="btn-save" id="save-post">Опубликовать на главной</button>
    </div>

    <div class="articles-list" id="articles-container">
        </div>
</main>

<script type="module">
    import { auth, db, logoutUser } from './components.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const adminEmail = "ttokyoshik@gmail.com";

    // Проверка прав доступа
    onAuthStateChanged(auth, (user) => {
        if (!user || user.email !== adminEmail) {
            window.location.href = "index.html";
        }
    });

    // Функция сохранения поста
    const savePost = async () => {
        const title = document.getElementById('post-title').value;
        const tag = document.getElementById('post-tag').value;
        const desc = document.getElementById('post-desc').value;
        const link = document.getElementById('post-link').value;

        if (!title || !link) return alert("Заполни хотя бы заголовок и ссылку");

        try {
            await addDoc(collection(db, "articles"), {
                title, tag, desc, link,
                createdAt: new Date()
            });
            location.reload();
        } catch (e) { console.error(e); }
    };

    document.getElementById('save-post').onclick = savePost;
    document.getElementById('admin-logout').onclick = () => logoutUser();

    // Загрузка списка для удаления
    const loadArticles = async () => {
        const querySnapshot = await getDocs(collection(db, "articles"));
        const container = document.getElementById('articles-container');
        querySnapshot.forEach((articleDoc) => {
            const data = articleDoc.data();
            const div = document.createElement('div');
            div.className = 'article-item';
            div.innerHTML = `
                <span>${data.title}</span>
                <button class="btn-delete" onclick="deleteArticle('${articleDoc.id}')">Удалить</button>
            `;
            container.appendChild(div);
        });
    };
    
    window.deleteArticle = async (id) => {
        if(confirm("Удалить статью?")) {
            await deleteDoc(doc(db, "articles", id));
            location.reload();
        }
    };

    loadArticles();
</script>

</body>
</html>
