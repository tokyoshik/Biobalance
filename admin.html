<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления | HEALTHLOGIC</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { padding-top: 80px; background: #f5f5f7; }
        .admin-container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #fff; padding: 30px; border-radius: 32px; border: 1px solid rgba(0,0,0,0.05); animation: appleReveal 0.6s backwards; }
        .stat-card h3 { font-size: 48px; margin: 0; letter-spacing: -2px; }
        .stat-card p { color: #86868b; margin: 5px 0 0 0; font-weight: 600; }
        
        .editor-section { background: #fff; padding: 40px; border-radius: 32px; margin-bottom: 40px; border: 1px solid rgba(0,0,0,0.05); }
        .input-field { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #d2d2d7; font-family: inherit; font-size: 16px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; }
        
        .article-manager { display: grid; gap: 15px; }
        .manage-item { background: #fff; padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(0,0,0,0.05); }
        .delete-btn { background: #ff3b30; color: #fff; padding: 8px 16px; border-radius: 50px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; }
        
        /* Скрытие контента до проверки */
        #admin-content { display: none; }
    </style>
</head>
<body>

<div id="admin-content" class="admin-container">
    <h1 style="font-weight: 800; letter-spacing: -1px; margin-bottom: 30px;">Системный контроль.</h1>

    <div class="stats-grid">
        <div class="stat-card">
            <h3 id="total-articles-count">0</h3>
            <p>Статей в базе</p>
        </div>
        <div class="stat-card">
            <h3 id="total-likes-count">0</h3>
            <p>Всего лайков</p>
        </div>
    </div>

    <div class="editor-section">
        <h2 style="margin-top:0">Новая публикация</h2>
        <input type="text" id="post-title" class="input-field" placeholder="Заголовок статьи">
        <textarea id="post-content" class="input-field" style="height: 150px;" placeholder="Основной текст..."></textarea>
        <input type="text" id="post-image" class="input-field" placeholder="URL картинки (unsplash)">
        <button id="publish-btn" style="width: 100%; background: #007aff;">Опубликовать в Bento Grid</button>
    </div>

    <div class="article-manager">
        <h2 style="margin-bottom: 20px;">Управление статьями (Анти-мусор)</h2>
        <div id="articles-list">
            </div>
    </div>
</div>

<script type="module">
    import { auth, db } from './components.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { collection, getDocs, addDoc, deleteDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const adminContent = document.getElementById('admin-content');
    const adminEmail = "ТВОЯ_ПОЧТА@GMAIL.COM"; // <--- ОБЯЗАТЕЛЬНО ЗАМЕНИ НА СВОЙ EMAIL

    // 1. ЗАЩИТА (Redirection Guard)
    onAuthStateChanged(auth, (user) => {
        if (user && user.email === adminEmail) {
            adminContent.style.display = 'block';
            initAdmin();
        } else {
            window.location.href = 'login.html';
        }
    });

    async function initAdmin() {
        loadStats();
        loadArticles();
    }

    // 2. СТАТИСТИКА
    async function loadStats() {
        const snap = await getDocs(collection(db, "articles"));
        document.getElementById('total-articles-count').textContent = snap.size;
        let likes = 0;
        snap.forEach(d => likes += (d.data().likes || 0));
        document.getElementById('total-likes-count').textContent = likes;
    }

    // 3. ПУБЛИКАЦИЯ
    document.getElementById('publish-btn').onclick = async () => {
        const title = document.getElementById('post-title').value;
        const text = document.getElementById('post-content').value;
        const img = document.getElementById('post-image').value;

        if(title.length < 3 || text.length < 10) {
            alert("Слишком короткий контент! (Анти-мусор)");
            return;
        }

        await addDoc(collection(db, "articles"), {
            title, text, img,
            createdAt: serverTimestamp(),
            likes: 0
        });
        location.reload();
    };

    // 4. СПИСОК И УДАЛЕНИЕ
    async function loadArticles() {
        const q = query(collection(db, "articles"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        const list = document.getElementById('articles-list');
        list.innerHTML = '';

        snap.forEach(article => {
            const data = article.data();
            const div = document.createElement('div');
            div.className = 'manage-item';
            div.innerHTML = `
                <div>
                    <strong>${data.title}</strong>
                    <p style="margin:0; font-size:12px; color:#888;">${new Date(data.createdAt?.toDate()).toLocaleDateString()}</p>
                </div>
                <button class="delete-btn" onclick="deleteArticle('${article.id}')">Удалить</button>
            `;
            list.appendChild(div);
        });
    }

    window.deleteArticle = async (id) => {
        if(confirm("Удалить статью навсегда?")) {
            await deleteDoc(doc(db, "articles", id));
            loadArticles();
            loadStats();
        }
    };
</script>

</body>
</html>
