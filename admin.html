<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HL | SECURE ADMIN</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="components.js"></script>
    <style>
        /* Скрываем всё тело по умолчанию, чтобы не было "мигания" админки при входе */
        body { font-family: -apple-system, sans-serif; background: #f5f5f7; display: none; padding: 40px; }
        .admin-wrap { width: 100%; max-width: 700px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .title-in { width: 100%; border: none; font-size: 32px; font-weight: 800; margin-bottom: 30px; outline: none; }
        .block { background: #f5f5f7; border-radius: 12px; padding: 15px; margin-top: 15px; position: relative; border: 1px solid #e5e5e5; }
        textarea, input { width: 100%; border: 1px solid #d2d2d7; border-radius: 10px; padding: 12px; margin-top: 10px; box-sizing: border-box; }
        .btn { padding: 12px 25px; border-radius: 20px; border: none; font-weight: 600; cursor: pointer; margin-top: 20px; }
        .btn-pub { background: #0071e3; color: #fff; float: right; }
        .btn-logout { background: #ff3b30; color: #fff; margin-bottom: 20px; }
    </style>
</head>
<body id="adminBody">

<div class="admin-wrap">
    <button class="btn btn-logout" onclick="firebase.auth().signOut()">Выйти из аккаунта</button>
    
    <input type="text" id="postTitle" class="title-in" placeholder="Название протокола">
    
    <div id="editor"></div>

    <button class="btn" onclick="add('text')">+ Текст</button>
    <button class="btn" onclick="add('image')">+ Изображение</button>
    <button class="btn btn-pub" onclick="save()">Опубликовать</button>
</div>

<script>
    // 1. ПРОВЕРКА ПРАВ
    firebase.auth().onAuthStateChanged(user => {
        if (user) {
            // Если ты вошел — показываем страницу
            document.getElementById('adminBody').style.display = 'block';
        } else {
            // Если зашел аноним — выкидываем на вход
            window.location.href = "login.html";
        }
    });

    // 2. ЛОГИКА РЕДАКТОРА
    let blocks = [];
    function add(t) { blocks.push({ id: Date.now(), type: t, content: "" }); render(); }
    function render() {
        const e = document.getElementById('editor'); e.innerHTML = "";
        blocks.forEach(b => {
            const d = document.createElement('div'); d.className = "block";
            d.innerHTML = `<small>${b.type.toUpperCase()}</small>
                ${b.type === 'text' 
                ? `<textarea oninput="blocks.find(x=>x.id===${b.id}).content=this.value"></textarea>`
                : `<input type="text" oninput="blocks.find(x=>x.id===${b.id}).content=this.value" placeholder="URL фото">`}`;
            e.appendChild(d);
        });
    }

    async function save() {
        const t = document.getElementById('postTitle').value;
        if(!t || blocks.length === 0) return alert("Пусто!");
        try {
            await firebase.database().ref('articles').push({ title: t, blocks: blocks, date: Date.now() });
            alert("Готово!"); location.reload();
        } catch(e) { alert("Нет доступа к базе!"); }
    }
</script>
</body>
</html>
