<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HL | ADMIN PANEL</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="components.js"></script>
    <style>
        :root { --main: #00ff41; --bg: #fff; --brd: 4px solid #000; --shd: 8px 8px 0px #000; }
        body { font-family: 'Inter', sans-serif; background: #f0f0f0; margin: 0; display: none; padding: 20px; }
        .box { background: var(--bg); border: var(--brd); box-shadow: var(--shd); max-width: 800px; margin: 40px auto; padding: 40px; }
        h1 { text-transform: uppercase; font-size: 40px; margin-bottom: 30px; border-bottom: var(--brd); padding-bottom: 10px; }
        .in-title { width: 100%; border: var(--brd); padding: 15px; font-size: 24px; font-weight: 900; margin-bottom: 20px; outline: none; }
        .block { background: #eee; border: var(--brd); padding: 20px; margin-bottom: 20px; position: relative; }
        textarea, .in-img { width: 100%; border: var(--brd); padding: 10px; font-family: inherit; font-size: 16px; margin-top: 10px; }
        .btn { background: var(--main); border: var(--brd); padding: 15px 30px; font-weight: 900; text-transform: uppercase; cursor: pointer; box-shadow: 4px 4px 0 #000; transition: 0.1s; }
        .btn:active { transform: translate(4px, 4px); box-shadow: 0 0 0 #000; }
        .btn-pub { background: #ff3e00; color: #fff; float: right; }
        .logout { background: #fff; margin-bottom: 20px; font-size: 12px; padding: 5px 10px; }
    </style>
</head>
<body id="b">
    <div class="box">
        <button class="btn logout" onclick="firebase.auth().signOut()">Выйти</button>
        <h1>Редактор Протоколов</h1>
        
        <input type="text" id="t" class="in-title" placeholder="НАЗВАНИЕ СТАТЬИ">
        
        <div id="editor"></div>

        <div style="margin-top: 30px;">
            <button class="btn" onclick="add('text')">+ ТЕКСТ</button>
            <button class="btn" onclick="add('image')">+ ФОТО (URL)</button>
            <button class="btn btn-pub" onclick="pub()">ОПУБЛИКОВАТЬ</button>
        </div>
    </div>

    <script>
        // ЖЕСТКАЯ ПРОВЕРКА ВХОДА
        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('b').style.display = 'block';
            } else {
                window.location.href = "login.html";
            }
        });

        let blocks = [];
        function add(type) {
            blocks.push({ id: Date.now(), type: type, content: "" });
            render();
        }

        function render() {
            const e = document.getElementById('editor'); e.innerHTML = "";
            blocks.forEach(b => {
                const div = document.createElement('div'); div.className = "block";
                div.innerHTML = `<b>${b.type.toUpperCase()}</b>
                ${b.type === 'text' 
                    ? `<textarea oninput="blocks.find(x=>x.id===${b.id}).content=this.value" rows="4"></textarea>`
                    : `<input type="text" class="in-img" oninput="blocks.find(x=>x.id===${b.id}).content=this.value" placeholder="URL картинки">`}`;
                e.appendChild(div);
            });
        }

        async function pub() {
            const title = document.getElementById('t').value;
            if(!title || blocks.length === 0) return alert("ПУСТО!");
            try {
                await db.ref('articles').push({
                    title: title,
                    blocks: blocks,
                    date: Date.now(),
                    likes: 0
                });
                alert("ПРОТОКОЛ СОХРАНЕН");
                location.reload();
            } catch(e) { alert("ОШИБКА ДОСТУПА"); }
        }
    </script>
</body>
</html>
