<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthLogic | Админ-панель</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #f4f4f4; --black: #000; --border: 3px solid #000; --accent: #DED7B1; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; padding: 20px; }
        
        .admin-container { max-width: 900px; margin: 0 auto; background: #fff; border: var(--border); box-shadow: 10px 10px 0px #000; padding: 30px; }
        h1 { font-weight: 900; text-transform: uppercase; margin-bottom: 20px; border-bottom: var(--border); padding-bottom: 10px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 900; text-transform: uppercase; font-size: 12px; margin-bottom: 8px; }
        input, textarea, select { width: 100%; padding: 12px; border: var(--border); font-family: inherit; font-weight: 700; outline: none; }

        /* Конструктор */
        #constructor-area { background: #fafafa; border: 2px dashed #000; padding: 20px; margin: 20px 0; }
        .block-item { background: #fff; border: var(--border); padding: 15px; margin-bottom: 15px; position: relative; display: flex; flex-direction: column; gap: 10px; }
        .block-item.half { width: 48%; display: inline-flex; vertical-align: top; }
        
        .block-controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-add { background: var(--accent); color: #000; border: var(--border); padding: 10px 20px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .btn-add:hover { background: #000; color: #fff; }

        .btn-publish { width: 100%; background: #000; color: #fff; border: none; padding: 20px; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 18px; margin-top: 20px; }
        .btn-publish:hover { background: var(--accent); color: #000; }

        .remove-btn { position: absolute; top: -10px; right: -10px; background: red; color: #fff; border: 2px solid #000; width: 25px; height: 25px; cursor: pointer; font-weight: 900; }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>Создать новую статью</h1>

    <div class="form-group">
        <label>Заголовок статьи</label>
        <input type="text" id="post-title" placeholder="Введите название...">
    </div>

    <div class="form-group">
        <label>Главная обложка (URL картинки)</label>
        <input type="text" id="post-main-img" placeholder="https://example.com/image.jpg">
    </div>

    <div id="constructor-area">
        <label>Конструктор контента</label>
        <div id="blocks-container">
            </div>

        <div class="block-controls">
            <button class="btn-add" onclick="addBlock('text')">+ Добавить текст</button>
            <button class="btn-add" onclick="addBlock('image')">+ Добавить фото</button>
        </div>
    </div>

    <button class="btn-publish" onclick="publishArticle()">Опубликовать на сайт</button>
    <a href="index.html" style="display:block; text-align:center; margin-top:20px; color:#000; font-weight:800; text-transform:uppercase; font-size:12px;">Вернуться на главную</a>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBgjwzfctB0Z9Lyak4WXTo_wxb2vS5L-rs",
        authDomain: "healthlogic-fe5bd.firebaseapp.com",
        databaseURL: "https://healthlogic-fe5bd-default-rtdb.firebaseio.com",
        projectId: "healthlogic-fe5bd",
        storageBucket: "healthlogic-fe5bd.firebasestorage.app",
        messagingSenderId: "177114233773",
        appId: "1:177114233773:web:0e341fb52efcf7dc2cff24"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function addBlock(type) {
        const container = document.getElementById('blocks-container');
        const id = Date.now();
        const block = document.createElement('div');
        block.className = 'block-item';
        block.id = 'block-' + id;

        let contentHtml = '';
        if (type === 'text') {
            contentHtml = `<textarea class="b-data" data-type="text" placeholder="Ваш текст..." rows="4"></textarea>`;
        } else {
            contentHtml = `<input type="text" class="b-data" data-type="image" placeholder="URL картинки...">`;
        }

        block.innerHTML = `
            <button class="remove-btn" onclick="document.getElementById('block-${id}').remove()">✕</button>
            <label>${type === 'text' ? 'Текстовый блок' : 'Блок изображения'}</label>
            ${contentHtml}
            <select class="b-width">
                <option value="100">Ширина: 100%</option>
                <option value="50">Ширина: 50% (в ряд)</option>
            </select>
        `;
        container.appendChild(block);
    }

    function publishArticle() {
        const title = document.getElementById('post-title').value;
        const mainImg = document.getElementById('post-main-img').value;
        const blockElements = document.querySelectorAll('.block-item');
        
        let blocks = [];
        blockElements.forEach(item => {
            const dataEl = item.querySelector('.b-data');
            const widthEl = item.querySelector('.b-width');
            blocks.push({
                type: dataEl.getAttribute('data-type'),
                content: dataEl.value,
                width: widthEl.value
            });
        });

        if (!title || blocks.length === 0) return alert("Заполни заголовок и добавь хотя бы один блок!");

        const newPostRef = db.ref('articles').push();
        newPostRef.set({
            title: title,
            image: mainImg,
            blocks: blocks,
            timestamp: Date.now()
        }).then(() => {
            alert("Статья успешно создана!");
            window.location.href = "index.html";
        }).catch(err => alert(err.message));
    }
</script>

</body>
</html>
