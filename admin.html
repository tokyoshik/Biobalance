<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HL ADMIN | NO-STORAGE MODE</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="components.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #111; color: #fff; padding: 20px; }
        .card { max-width: 600px; margin: 0 auto; background: #222; border: 4px solid #ffcc00; padding: 25px; }
        .block { border: 2px solid #444; padding: 15px; margin-top: 15px; background: #000; }
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; background: #111; color: #fff; border: 1px solid #ffcc00; box-sizing: border-box; }
        .btn { padding: 10px; background: #ffcc00; color: #000; border: none; font-weight: 900; cursor: pointer; margin: 10px 5px 0 0; }
        .save-btn { width: 100%; background: #00ff00; margin-top: 30px; font-size: 18px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:#ffcc00">БЛОЧНЫЙ РЕДАКТОР v2.0</h2>
    <input type="text" id="title" placeholder="ЗАГОЛОВОК СТАТЬИ">
    <div id="editor"></div>
    
    <button class="btn" onclick="add('text')">+ ТЕКСТ</button>
    <button class="btn" onclick="add('image')">+ КАРТИНКА (URL)</button>
    
    <button class="btn save-btn" onclick="save()">ОПУБЛИКОВАТЬ В БАЗУ</button>
</div>

<script>
    let blocks = [];

    function add(type) {
        blocks.push({ id: Date.now(), type: type, content: "" });
        render();
    }

    function render() {
        const root = document.getElementById('editor');
        root.innerHTML = "";
        blocks.forEach(b => {
            const div = document.createElement('div');
            div.className = "block";
            div.innerHTML = `
                <strong>БЛОК: ${b.type.toUpperCase()}</strong>
                ${b.type === 'text' 
                    ? `<textarea oninput="update(${b.id}, this.value)" placeholder="Пиши текст тут..."></textarea>`
                    : `<input type="text" oninput="update(${b.id}, this.value)" placeholder="Вставь ссылку на картинку (http...)">`
                }
            `;
            root.appendChild(div);
        });
    }

    function update(id, val) {
        blocks.find(x => x.id === id).content = val;
    }

    async function save() {
        const t = document.getElementById('title').value;
        if(!t || blocks.length === 0) return alert("Заполни всё!");
        await db.ref('articles').push({ title: t, blocks: blocks, time: Date.now() });
        alert("ГОТОВО! Проверяй статью.");
        location.reload();
    }
</script>
</body>
</html>
