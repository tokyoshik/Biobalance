<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль | HEALTHLOGIC</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22black%22/><text y=%2250%%22 x=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-family=%22Inter, sans-serif%22 font-size=%2260%22 font-weight=%22900%22 fill=%22white%22>H</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f5f5f7; --radius: 32px; --accent: #007aff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: var(--bg); color: #1d1d1f; padding-top: 100px; }

        /* HEADER */
        .main-header { position: fixed; top: 0; width: 100%; height: 64px; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); z-index: 2000; border-bottom: 0.5px solid rgba(0,0,0,0.1); }
        .logo { font-weight: 900; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; gap: 8px; text-decoration: none; color: inherit; }
        .logo-icon { width: 24px; height: 24px; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 14px; }
        .nav-right a { text-decoration: none; color: #1d1d1f; font-size: 14px; font-weight: 600; margin-left: 20px; }

        /* PROFILE CARD */
        .profile-container { max-width: 800px; margin: 0 auto; padding: 0 5%; animation: appleReveal 0.8s ease-out; }
        .profile-card { background: #fff; border-radius: var(--radius); padding: 50px; border: 1px solid rgba(0,0,0,0.05); text-align: center; }
        
        .avatar-placeholder { width: 100px; height: 100px; background: #000; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; margin: 0 auto 20px; }
        
        h1 { font-size: 42px; font-weight: 900; letter-spacing: -2px; margin-bottom: 10px; }
        .user-email { color: #86868b; font-size: 18px; margin-bottom: 30px; }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 40px; }
        .stat-box { background: #fbfbfd; padding: 25px; border-radius: 24px; border: 1px solid rgba(0,0,0,0.03); }
        .stat-box span { display: block; font-size: 12px; font-weight: 800; color: #86868b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .stat-box p { font-size: 24px; font-weight: 900; }

        .admin-link { display: inline-block; margin-top: 30px; padding: 15px 30px; background: var(--accent); color: #fff; text-decoration: none; border-radius: 50px; font-weight: 700; transition: 0.3s; }
        .admin-link:hover { opacity: 0.9; transform: scale(1.02); }

        .logout-btn { display: block; margin: 40px auto 0; background: none; border: none; color: #ff3b30; font-weight: 700; cursor: pointer; font-size: 16px; }

        @keyframes appleReveal {
            0% { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
    </style>
</head>
<body>

<header class="main-header">
    <a href="index.html" class="logo">
        <div class="logo-icon">H</div>
        HEALTHLOGIC
    </a>
    <nav class="nav-right">
        <a href="index.html">Главная</a>
        <a href="#" id="logout-top" style="color: #ff3b30;">Выход</a>
    </nav>
</header>

<main class="profile-container">
    <div class="profile-card">
        <div class="avatar-placeholder" id="user-initial">?</div>
        <h1 id="user-name">Загрузка...</h1>
        <p class="user-email" id="display-email">определяем статус...</p>

        <div class="stats-grid">
            <div class="stat-box">
                <span>Статус</span>
                <p id="user-role">User</p>
            </div>
            <div class="stat-box">
                <span>Протоколы</span>
                <p>3 Доступно</p>
            </div>
        </div>

        <a href="admin.html" id="admin-panel-btn" class="admin-link" style="display: none;">Панель управления</a>
        
        <button class="logout-btn" id="logout-trigger">Выйти из системы</button>
    </div>
</main>

<script type="module">
    import { auth, logoutUser } from './components.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const adminEmail = "ttokyoshik@gmail.com"; // Твой email

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const email = user.email;
            const initial = email.charAt(0).toUpperCase();
            
            document.getElementById('user-initial').innerText = initial;
            document.getElementById('display-email').innerText = email;
            document.getElementById('user-name').innerText = email.split('@')[0];

            if (email === adminEmail) {
                document.getElementById('user-role').innerText = "Administrator";
                document.getElementById('user-role').style.color = "#007aff";
                document.getElementById('admin-panel-btn').style.display = 'inline-block';
            } else {
                document.getElementById('user-role').innerText = "Elite Athlete";
            }
        } else {
            // Если не залогинен — отправляем на вход
            window.location.href = "login.html";
        }
    });

    // Обработка выхода
    const handleLogout = (e) => {
        e.preventDefault();
        logoutUser();
    };

    document.getElementById('logout-trigger').onclick = handleLogout;
    document.getElementById('logout-top').onclick = handleLogout;
</script>

</body>
</html>
