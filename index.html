<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>HealthLogic | Протоколы биохакинга и медицина будущего</title>
    <meta name="description" content="Научный подход к здоровью. Эффективные протоколы по приему нутрицевтиков, тренировкам и оптимизации образа жизни.">
    <meta name="keywords" content="биохакинг, магний, клетчатка, здоровье, протоколы питания, долголетие">
    
    <meta property="og:title" content="HealthLogic — Твой гид в мире биохакинга">
    <meta property="og:description" content="Разбираем сложные медицинские исследования в простые и понятные протоколы.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1505751172177-5180c4fe2474?auto=format&fit=crop&w=1200">
    <meta property="og:type" content="website">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="components.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Твой предыдущий CSS стиль здесь */
    </style>
</head>
<body>

<nav>
    <div class="logo">HEALTHLOGIC</div>
    <div class="nav-links">
        <a href="index.html">Главная</a>
        <span id="adm-link" style="display:none;"><a href="admin.html">Админка</a></span>
        <a href="login.html" id="l-btn">Вход</a>
        <button id="o-btn" style="display:none;" onclick="firebase.auth().signOut()">Выход</button>
    </div>
</nav>

<section class="hero">
    <h1>Future<br>Health.</h1>
</section>

<div class="top-container" id="top-list"></div>
<div class="feed" id="main-feed"></div>

<script>
    // AUTH LOGIC
    firebase.auth().onAuthStateChanged(u => {
        document.getElementById('adm-link').style.display = u ? 'inline' : 'none';
        document.getElementById('o-btn').style.display = u ? 'inline' : 'none';
        document.getElementById('l-btn').style.display = u ? 'none' : 'inline';
    });

    // CONTENT LOADING
    db.ref('articles').orderByChild('date').on('value', snap => {
        const data = snap.val(); if(!data) return;
        const list = Object.keys(data).map(k => ({id: k, ...data[k]})).reverse();

        const topArea = document.getElementById('top-list');
        topArea.innerHTML = "";
        list.slice(0, 3).forEach((p, i) => {
            topArea.innerHTML += `
                <a href="article.html?id=${p.id}" class="top-card">
                    <small>Protocol 0${i+1}</small>
                    <h2>${p.title}</h2>
                </a>
            `;
        });

        const feedArea = document.getElementById('main-feed');
        feedArea.innerHTML = "";
        list.slice(3).forEach(p => {
            feedArea.innerHTML += `
                <a href="article.html?id=${p.id}" class="article-row">
                    <h3>${p.title}</h3>
                    <span>${new Date(p.date).toLocaleDateString()} →</span>
                </a>
            `;
        });
    });
</script>
</body>
</html>
