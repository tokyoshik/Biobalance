<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthLogic | Аналитическая Платформа</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FDF5E6; --black: #000; --white: #fff; --accent: #DED7B1; --border: 4px solid #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--black); overflow-x: hidden; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

        /* ВЕРХНЯЯ ПАНЕЛЬ АВТОРИЗАЦИИ */
        .auth-bar { background: var(--black); color: var(--white); padding: 12px 0; border-bottom: var(--border); position: sticky; top: 0; z-index: 1000; }
        .auth-content { display: flex; justify-content: space-between; align-items: center; }
        #auth-btn { background: var(--accent); border: none; padding: 6px 18px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 12px; }

        header { padding: 60px 0; border-bottom: var(--border); background: var(--white); }
        .logo { font-size: clamp(40px, 8vw, 80px); font-weight: 900; letter-spacing: -4px; text-transform: uppercase; line-height: 0.8; }

        /* КАРТОЧКА КАЛЬКУЛЯТОРА (СЛОЖНОСТЬ 7/10) */
        .calc-section { padding: 80px 0; }
        .grid-layout { display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; align-items: start; }
        @media (max-width: 768px) { .grid-layout { grid-template-columns: 1fr; } }

        .calc-card { background: var(--white); border: var(--border); padding: 40px; box-shadow: 20px 20px 0px var(--black); }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 900; text-transform: uppercase; font-size: 12px; margin-bottom: 5px; }
        input, select { width: 100%; padding: 15px; border: 3px solid var(--black); font-family: inherit; font-weight: 700; font-size: 16px; outline: none; }
        input:focus { background: var(--accent); }

        .main-btn { width: 100%; padding: 20px; background: var(--black); color: var(--white); border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .main-btn:hover { background: var(--accent); color: var(--black); }

        /* ПАНЕЛЬ РЕЗУЛЬТАТОВ */
        #results-panel { background: var(--white); border: var(--border); padding: 40px; display: none; box-shadow: 20px 20px 0px var(--accent); }
        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .res-box { border: 2px solid #000; padding: 15px; text-align: center; }
        .res-val { font-size: 32px; font-weight: 900; display: block; }

        /* СТАТЬИ */
        .articles { padding: 80px 0; border-top: var(--border); }
        .article-card { display: block; color: #000; text-decoration: none; padding: 30px; border: var(--border); margin-bottom: 20px; transition: 0.3s; }
        .article-card:hover { background: var(--accent); transform: translate(-5px, -5px); box-shadow: 10px 10px 0px #000; }
    </style>
</head>
<body>

<div class="auth-bar">
    <div class="container auth-content">
        <span id="user-display" style="font-weight: 900; font-size: 12px; text-transform: uppercase;">Система: Гость</span>
        <button id="auth-btn" onclick="handleAuth()">Войти</button>
    </div>
</div>

<header>
    <div class="container">
        <div class="logo">HEALTH<br>LOGIC.</div>
    </div>
</header>

<main class="container">
    <section class="calc-section">
        <div class="grid-layout">
            <div class="calc-card">
                <h2 style="font-weight: 900; text-transform: uppercase; margin-bottom: 30px;">Лаборатория БЖУ</h2>
                <div class="input-group">
                    <label>Цель</label>
                    <select id="goal">
                        <option value="0.8">Снижение веса</option>
                        <option value="1">Поддержание</option>
                        <option value="1.15">Набор массы</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="input-group" style="flex:1;"><label>Вес (кг)</label><input type="number" id="w"></div>
                    <div class="input-group" style="flex:1;"><label>Рост (см)</label><input type="number" id="h"></div>
                </div>
                <div class="input-group">
                    <label>Возраст</label>
                    <input type="number" id="a">
                </div>
                <div class="input-group">
                    <label>Активность</label>
                    <select id="act">
                        <option value="1.2">Минимальная</option>
                        <option value="1.55">Средняя (3-4 тренировки)</option>
                        <option value="1.9">Экстремальная</option>
                    </select>
                </div>
                <button class="main-btn" onclick="calculateAll()">Рассчитать био-маркеры</button>
            </div>

            <div id="results-panel">
                <h2 style="font-weight: 900; text-transform: uppercase;">Ваш Отчет:</h2>
                <div class="res-grid">
                    <div class="res-box" style="grid-column: span 2; background: #000; color: #fff;">
                        <span style="font-size: 12px; text-transform: uppercase;">Калории (Сутки)</span>
                        <span id="res-cal" class="res-val">0</span>
                    </div>
                    <div class="res-box"><span style="font-size:10px;">БЕЛКИ</span><span id="res-p" class="res-val">0</span></div>
                    <div class="res-box"><span style="font-size:10px;">ЖИРЫ</span><span id="res-f" class="res-val">0</span></div>
                    <div class="res-box" style="grid-column: span 2;"><span style="font-size:10px;">УГЛЕВОДЫ</span><span id="res-c" class="res-val">0</span></div>
                </div>
                <p style="margin-top: 20px; font-size: 12px; font-weight: 700;">* Данные рассчитаны по формуле Миффлина-Сан Жеор.</p>
            </div>
        </div>
    </section>

    <section class="articles">
        <h2 style="font-weight: 900; text-transform: uppercase; margin-bottom: 40px;">База Знаний</h2>
        <a href="magnesium.html" class="article-card">
            <h3 style="font-weight: 900; text-transform: uppercase;">01. Магний: Почему ты не спишь? →</h3>
        </a>
        <a href="training.html" class="article-card">
            <h3 style="font-weight: 900; text-transform: uppercase;">02. Наука гипертрофии и роста →</h3>
        </a>
        <a href="fiber.html" class="article-card">
            <h3 style="font-weight: 900; text-transform: uppercase;">03. Клетчатка: Топливо для мозга →</h3>
        </a>
    </section>
</main>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
  // === ВСТАВЬ СВОЙ КОНФИГ НИЖЕ ===
  // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyBgjwzfctB0Z9Lyak4WXTo_wxb2vS5L-rs",
  authDomain: "healthlogic-fe5bd.firebaseapp.com",
  projectId: "healthlogic-fe5bd",
  storageBucket: "healthlogic-fe5bd.firebasestorage.app",
  messagingSenderId: "177114233773",
  appId: "1:177114233773:web:0e341fb52efcf7dc2cff24"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
  // ===============================

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // ФУНКЦИЯ АВТОРИЗАЦИИ
  function handleAuth() {
      const email = prompt("Email:");
      const pass = prompt("Пароль (мин. 6 символов):");
      if(email && pass) {
          auth.createUserWithEmailAndPassword(email, pass)
              .catch(() => auth.signInWithEmailAndPassword(email, pass))
              .catch(err => alert(err.message));
      }
  }

  auth.onAuthStateChanged(user => {
      const btn = document.getElementById('auth-btn');
      const display = document.getElementById('user-display');
      if (user) {
          display.innerText = "Аккаунт: " + user.email.toUpperCase();
          btn.innerText = "Выйти";
          btn.onclick = () => auth.signOut();
      } else {
          display.innerText = "Система: Гость";
          btn.innerText = "Войти";
          btn.onclick = handleAuth;
      }
  });

  // ЛОГИКА КАЛЬКУЛЯТОРА
  function calculateAll() {
      const w = parseFloat(document.getElementById('w').value);
      const h = parseFloat(document.getElementById('h').value);
      const a = parseInt(document.getElementById('a').value);
      const act = parseFloat(document.getElementById('act').value);
      const goal = parseFloat(document.getElementById('goal').value);

      if(w && h && a) {
          // Базовый метаболизм + коэфф. активности + цель
          let tdee = ((10 * w) + (6.25 * h) - (5 * a) + 5) * act * goal;
          
          // Распределение БЖУ
          const p = w * 2; // 2г белка на кг
          const f = w * 0.9; // 0.9г жира на кг
          const c = (tdee - (p * 4) - (f * 9)) / 4;

          document.getElementById('res-cal').innerText = Math.round(tdee);
          document.getElementById('res-p').innerText = Math.round(p) + "г";
          document.getElementById('res-f').innerText = Math.round(f) + "г";
          document.getElementById('res-c').innerText = Math.round(c) + "г";
          
          document.getElementById('results-panel').style.display = 'block';
      } else {
          alert("Введите данные для анализа!");
      }
  }
</script>

</body>
                        </html>
