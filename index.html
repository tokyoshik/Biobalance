<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthLogic | Главная</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script src="components.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #f0f0f0; --white: #fff; --black: #000; --accent: #DED7B1; --border: 4px solid #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; padding: 20px; }

        .header { max-width: 1200px; margin: 0 auto 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; font-size: 32px; text-transform: uppercase; letter-spacing: -1px; }

        /* Панель пользователя (из components.js) */
        #user-panel { display: flex; align-items: center; gap: 15px; }

        #articles-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 30px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .article-card { 
            background: var(--white); 
            border: var(--border); 
            box-shadow: 10px 10px 0px var(--black); 
            transition: 0.2s; 
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .article-card:hover { transform: translate(-5px, -5px); box-shadow: 15px 15px 0px var(--accent); }
        
        .card-img { width: 100%; height: 200px; object-fit: cover; border-bottom: var(--border); display: block; background: #eee; }
        .card-content { padding: 20px; }
        .card-content h2 { font-weight: 900; text-transform: uppercase; font-size: 20px; margin-bottom: 10px; line-height: 1.1; }
        .card-content p { font-size: 14px; color: #444; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">HealthLogic</div>
        <div id="user-panel">
            </div>
    </header>

    <main id="articles-container">
        <p id="loading-msg" style="font-weight: 900; text-transform: uppercase;">Связь с базой данных...</p>
    </main>

    <script>
        // ЛОГИКА ЗАГРУЗКИ СТАТЕЙ
        function loadMainArticles() {
            const container = document.getElementById('articles-container');
            const loadingMsg = document.getElementById('loading-msg');

            db.ref('articles').on('value', (snapshot) => {
                const data = snapshot.val();
                container.innerHTML = ''; // Очищаем контейнер

                if (!data) {
                    container.innerHTML = '<p>Статей пока нет. Создай их в админке!</p>';
                    return;
                }

                // Превращаем объект в массив и выводим
                Object.keys(data).forEach(id => {
                    const post = data[id];
                    const card = `
                        <a href="article.html?id=${id}" class="article-card">
                            <img src="${post.image || ''}" class="card-img" onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'">
                            <div class="card-content">
                                <h2>${post.title}</h2>
                                <p>${post.views || 0} просмотров</p>
                            </div>
                        </a>
                    `;
                    container.innerHTML += card;
                });
            }, (error) => {
                console.error("Ошибка Firebase:", error);
                loadingMsg.innerText = "Ошибка доступа к базе. Проверь Rules.";
            });
        }

        // Запуск при загрузке
        document.addEventListener('DOMContentLoaded', loadMainArticles);
    </script>

</body>
</html>
